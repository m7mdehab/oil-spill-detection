# Local run of the full application (API + built frontend) on the Hugging Face
# Spaces port (7860). Build and start with: `docker compose up --build`.
services:
  oilspill:
    build:
      context: .
      dockerfile: Dockerfile
    image: oilspill-app
    ports:
      - "7860:7860"
    environment:
      # Point at the published model to enable /predict (optional; the app serves
      # without it). Uncomment once the model is published to the Hub:
      # OILSPILL_MODEL_HF_REPO: m7mdehab/oil-spill-segmentation
      # OILSPILL_MODEL_FILE: model.onnx
      PORT: "7860"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
