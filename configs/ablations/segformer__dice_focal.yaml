# Ablation cell: arch=segformer, loss=dice_focal.
# Generated by scripts/run_ablations.py -- edit the matrix there, not here.
# Fixed for fairness: seed=42, epochs=40. Headline metrics: oil IoU & oil recall.
model:
  arch: segformer
  encoder: mit-b2
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 5
  params:
    hf_model: nvidia/mit-b2
data:
  root: data/datasets/oil_spill
  image_size: 512
  batch_size: 8
  num_workers: 4
  val_split: 0.2
  split_seed: 42
optim:
  lr: 6.0e-05
  weight_decay: 0.01
  epochs: 40
  optimizer: adamw
  scheduler: cosine
loss:
  type: dice_focal
  class_weights: auto
  focal_gamma: 2.0
runtime:
  seed: 42
  amp: true
  device: auto
  precision: bf16
  deterministic: true
early_stopping:
  enabled: true
  monitor: val_oil_iou
  mode: max
  patience: 10
  min_delta: 0.0
checkpoint:
  dir: artifacts/checkpoints
  save_best: true
  save_last: true
  monitor: val_oil_iou
  mode: max
mlflow:
  experiment_name: oil-spill-segmentation
  tracking_uri: ./mlruns
  log_samples: 4
  run_name: abl-segformer-dice_focal
