name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint, type-check, and test
        run: make check

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: Build runtime stage (capture log)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          docker build --target runtime -t oilspill-app . 2>&1 | tee /tmp/build.log

      - name: Publish build log to ci-debug branch
        if: always()
        run: |
          tail -150 /tmp/build.log > build-error.log
          git config user.email "ci@local"; git config user.name "ci"
          git add -f build-error.log
          git commit -m "ci debug build log [skip ci]" || true
          git push -f origin HEAD:ci-debug

      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        run: echo "runtime build failed; see ci-debug branch" && exit 1

      - name: Start container and check health
        run: |
          docker run -d --name oilspill -p 7860:7860 oilspill-app
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:7860/healthz; then echo "healthy"; exit 0; fi
            sleep 5
          done
          echo "container did not become healthy"; docker logs oilspill; exit 1
